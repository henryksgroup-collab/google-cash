<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store,no-cache,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Carregando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background-color:#f0f4ff;
  background-image:
    linear-gradient(rgba(26,115,232,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,115,232,.07) 1px,transparent 1px);
  background-size:22px 22px;
}

/* GATE */
#__gate{display:flex;align-items:center;justify-content:center;height:100vh;background:transparent;flex-direction:column;gap:16px}
.gate-spinner{width:36px;height:36px;border:3px solid #dbe4ff;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite}
.gate-txt{font-size:13px;color:#9eabc8}

/* APP */
#__app{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:rgba(240,244,255,.88);position:relative;backdrop-filter:blur(0px)}

/* HEADER */
#hdr{background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.hlogo span{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hbadges{display:flex;gap:6px}
.hbdg{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;cursor:default;transition:transform .1s}
.hbdg.xp{background:#e8f0fe;color:#1a73e8}
.hbdg.cash{background:#e6f4ea;color:#188038}
.hbdg svg{width:11px;height:11px}

/* XP FLOAT */
.xp-float{position:fixed;right:16px;top:58px;font-size:12px;font-weight:700;color:#1a73e8;background:#e8f0fe;padding:4px 10px;border-radius:99px;pointer-events:none;z-index:100;animation:xpFloat .9s ease forwards}
.cash-float{position:fixed;right:16px;top:84px;font-size:12px;font-weight:700;color:#188038;background:#e6f4ea;padding:4px 10px;border-radius:99px;pointer-events:none;z-index:100;animation:xpFloat .9s ease forwards}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:.5px solid rgba(0,0,0,.1);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 12px;background:none;border:none;cursor:pointer;gap:3px;outline:none;transition:opacity .1s}
.nb:active{opacity:.7}
.nb svg{width:18px;height:18px;stroke-width:1.6;color:#999;transition:color .15s,stroke-width .15s}
.nb span{font-size:9.5px;color:#999;font-weight:500;transition:color .15s,font-weight .15s}
.nb.a svg{stroke-width:2.2;color:#1a73e8}
.nb.a span{color:#1a73e8;font-weight:700}
#nb-criar{padding-top:4px}
#nb-criar span{color:#7c3aed;font-weight:700}
#nb-criar.a span{color:#1a73e8}

/* CONTENT */
#cnt{padding:16px 16px 110px;min-height:calc(100vh - 52px);overflow-y:auto}

/* CARDS */
.cd{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:14px 16px}
.cd+.cd{margin-top:10px}
.cdp0{padding:0;overflow:hidden}

/* SECTIONS */
.section{display:none;animation:slideUp .22s ease}
.section.active{display:block}

/* TAGS */
.tg{font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:99px;display:inline-block;line-height:1.6}

/* XP BAR */
.xptrack{height:7px;background:#e8eaed;border-radius:99px;overflow:hidden}
.xpfill{height:100%;border-radius:99px;background:linear-gradient(90deg,#1a73e8,#34a853);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* MODULE CARD */
.mcrd{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s,transform .1s,box-shadow .15s;margin-bottom:8px}
.mcrd:active{transform:scale(.98)}
.micn{width:42px;height:42px;min-width:42px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.micn svg{width:18px;height:18px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border-radius:8px;font-size:11.5px;cursor:pointer;border:.5px solid rgba(0,0,0,.1);background:#fff;color:#888;font-weight:500;transition:all .15s;font-family:inherit;white-space:nowrap}
.tab svg{width:12px;height:12px;flex-shrink:0}
.tab.a{font-weight:700}
/* ROI CALC */
.roi-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0f0;font-size:13px}
.roi-val{font-weight:700;color:#1a73e8}
.roi-green{color:#34a853}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:#f8f9fa;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:#1a73e8;line-height:1.1}
.stat-lbl{font-size:11px;color:#888;margin-top:2px}
.prospect-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:14px;margin-bottom:8px}
.btn-primary{width:100%;padding:13px;background:#1a73e8;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-sec{width:100%;padding:11px;background:#f8f9fa;color:#1a73e8;border:.5px solid #1a73e8;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sec:active{opacity:.8}
.result-box{background:#f8f9fa;border-radius:12px;padding:14px;margin-top:12px;font-size:13px;color:#202124;line-height:1.6}
.score-ring{width:80px;height:80px;border-radius:50%;background:conic-gradient(#1a73e8 var(--p), #e8eaed var(--p));display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.score-inner{width:62px;height:62px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column}
.wa-float-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;justify-content:center}
.channel-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0f0}
.channel-badge{padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700}
.badge-alta{background:#fce8e6;color:#ea4335}
.badge-media{background:#fef7e0;color:#f9ab00}
.badge-baixa{background:#e6f4ea;color:#34a853}

/* QUIZ */
.qopt{display:flex;align-items:center;gap:11px;padding:11px 14px;border:.5px solid rgba(0,0,0,.08);border-radius:8px;margin-bottom:8px;cursor:pointer;background:#fff;transition:all .15s;font-family:inherit;width:100%;text-align:left}
.qopt:active{transform:scale(.98)}
.qopt.correct{background:#e6f4ea;border-color:#34a853}
.qopt.wrong{background:#fce8e6;border-color:#ea4335}
.qlet{width:22px;height:22px;min-width:22px;border-radius:50%;border:.5px solid rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666}

/* CHECKLIST */
.chkrow{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border-top:.5px solid rgba(0,0,0,.06);cursor:pointer;transition:background .15s}
.chkrow:first-child{border-top:none}
.chkrow:active{background:#f8f9fa}
.chkrow svg{min-width:15px;margin-top:1px;transition:transform .2s}
.chkrow.checked svg{animation:bounceIn .3s ease}

/* STEP */
.step{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
.stepn{width:22px;height:22px;min-width:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0}
.stepn span{font-size:11px;font-weight:700;color:#fff}

/* INPUTS */
.inp{width:100%;font-size:13px;padding:10px 12px;border-radius:8px;border:.5px solid rgba(0,0,0,.15);background:#f8f9fa;color:#202124;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.1);background:#fff}
.inp.mb{margin-bottom:8px}
textarea.inp{resize:vertical;min-height:72px}
select.inp{cursor:pointer}

/* BUTTONS */
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-blue{background:#1a73e8;color:#fff}
.btn-green{background:#34a853;color:#fff}
.btn-gray{background:#f1f3f4;color:#444}
.btn svg{width:14px;height:14px}

/* CLIENT */
.cliavt{width:36px;height:36px;min-width:36px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1a73e8;flex-shrink:0}

/* SECTIONS LABEL */
.slbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin:0 0 10px}

/* TOAST */
#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%) scale(.9);background:#202124;color:#fff;padding:8px 16px;border-radius:99px;font-size:12px;font-weight:700;z-index:99;white-space:nowrap;pointer-events:none;opacity:0;transition:all .2s;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) scale(1)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-bg.hidden{display:none}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.32,.72,0,1)}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:99px;margin:0 auto 16px}

/* MISC */
.row{display:flex;align-items:center;gap:10px}
.flex1{flex:1;min-width:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.muted{color:#666;font-size:13px;line-height:1.6}
.green{color:#188038}.blue{color:#1a73e8}.red{color:#c5221f}.amber{color:#a07000}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:#666;font-size:13px;padding:0 0 14px;font-family:inherit}
.back-btn svg{width:15px;height:15px}
.complete-btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:background .2s,transform .1s;font-family:inherit}
.complete-btn:active{transform:scale(.97)}
.done-banner{margin-top:14px;padding:12px;background:#e6f4ea;border:.5px solid #34a85330;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:#188038;font-size:13px;font-weight:700}
.info-box{border-radius:10px;padding:12px 14px;margin-bottom:10px}
.info-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.info-row svg{width:13px;height:13px;min-width:13px}
.dots{display:flex;gap:5px}
.dot{width:8px;height:8px;border-radius:50%}
.stat-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 14px}
.badge-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:12px 14px;text-align:center;transition:transform .2s}
.badge-card.earned{animation:bounceIn .4s ease}
.tool-link{display:flex;align-items:center;gap:12px;background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:12px 14px;margin-bottom:8px;color:inherit;text-decoration:none;transition:border-color .15s}
.tool-link:active{border-color:#1a73e8}
.plan-card{background:#fff;border-radius:12px;padding:13px 15px;margin-bottom:10px;border:.5px solid rgba(0,0,0,.08)}
.copy-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:.5px solid rgba(0,0,0,.1);background:#f1f3f4;color:#444;font-family:inherit;transition:all .15s}
.copy-btn.done{background:#e6f4ea;border-color:#34a85340;color:#188038}
.wa-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:.5px solid #25d36640;background:#e7fde8;color:#128c7e;text-decoration:none}
.wa-btn svg{width:13px;height:13px}
.sim-card{background:linear-gradient(135deg,#e8f0fe,#f0f7ff);border:.5px solid #1a73e820;border-radius:14px;padding:16px}
.sim-result{display:none;margin-top:12px;padding:12px;border-radius:10px;font-size:13px;font-weight:600;text-align:center}
.note-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;margin-bottom:8px;overflow:hidden}
.note-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.agenda-item{padding:11px 15px;border-top:.5px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;cursor:pointer}
.agenda-item:first-child{border-top:none}
.agenda-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mod-header{border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.mod-header-icn{width:46px;height:46px;min-width:46px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.prompt-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 15px;margin-bottom:8px}

/* KEYFRAMES */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
@keyframes bounceIn{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes xpFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes levelUpPulse{0%{box-shadow:0 0 0 0 rgba(26,115,232,.5)}70%{box-shadow:0 0 0 16px rgba(26,115,232,0)}100%{box-shadow:0 0 0 0 rgba(26,115,232,0)}}
</style>
</head>
<body>

<!-- GATE -->
<div id="__gate">
  <div class="gate-spinner"></div>
  <p class="gate-txt">Verificando acesso...</p>
</div>

<!-- APP -->
<div id="__app">
  <div id="hdr">
    <div class="hlogo">
      <span style="color:#1a73e8">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#1a73e8">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span><span style="color:#202124;margin-left:4px">Cash</span>
    </div>
    <div class="hbadges">
      <div class="hbdg xp" id="hxp">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        <span id="xp-val">0</span> XP
      </div>
      <div class="hbdg" style="background:#fff3e0;color:#e65100;cursor:pointer" id="hcredits" onclick="nav('more');setTimeout(function(){renderMore('setup');},50)" title="Creditos de IA">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
        <span id="credits-val">50</span>cr
      </div>
    </div>
  </div>

  <div id="cnt">
    <div id="s-home" class="section active"></div>
    <div id="s-modules" class="section"></div>
    <div id="s-criar" class="section"></div>
    <div id="s-clients" class="section"></div>
    <div id="s-plan" class="section"></div>
    <div id="s-more" class="section"></div>
  </div>

  <nav id="nav">
    <button class="nb a" data-v="home" onclick="nav('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Início</span>
    </button>
    <button class="nb" data-v="modules" onclick="nav('modules')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span>Módulos</span>
    </button>
    <button class="nb" data-v="criar" onclick="nav('criar')" id="nb-criar" style="position:relative">
      <div style="position:absolute;top:6px;width:32px;height:32px;background:linear-gradient(135deg,#1a73e8,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(26,115,232,.35)">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
      <span style="margin-top:22px">Criar</span>
    </button>
    <button class="nb" data-v="clients" onclick="nav('clients')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      <span>Clientes</span>
    </button>
    <button class="nb" data-v="more" onclick="nav('more')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
      <span>Mais</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
/* ═══════ GATE ═══════ */
;(function(){
  var TOKEN='gc2024x9z', CK='__gc_auth', SK='__gc_sess';
  function checkToken(){
    var p=new URLSearchParams(location.search),t=p.get('access')||p.get('utm_content')||p.get('ref');
    if(t===TOKEN){
      try{sessionStorage.setItem(SK,btoa(TOKEN+Date.now()));var d=new Date();d.setTime(d.getTime()+86400000);document.cookie=CK+'='+btoa(TOKEN)+';expires='+d.toUTCString()+';path=/;SameSite=Strict';}catch(e){}
      try{history.replaceState({},'',location.pathname);}catch(e){}
      return true;
    }
    try{var s=sessionStorage.getItem(SK);if(s&&atob(s).indexOf(TOKEN)===0)return true;}catch(e){}
    try{var ck=document.cookie.split(';').find(function(c){return c.trim().startsWith(CK+'=');});if(ck&&atob(ck.split('=')[1].trim())===TOKEN)return true;}catch(e){}
    return false;
  }
  function boot(){
    if(!checkToken()){setTimeout(function(){try{location.replace('https://www.google.com');}catch(e){}},100);return;}
    document.getElementById('__gate').style.display='none';
    document.getElementById('__app').style.display='block';
    document.title='Google Cash';
    document.addEventListener('contextmenu',function(e){e.preventDefault();});
    document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C','U'].indexOf(e.key)>-1)||(e.ctrlKey&&e.key==='U')||(e.ctrlKey&&e.key==='S')){e.preventDefault();}});
    initApp();
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot);}else{setTimeout(boot,300);}
})();

/* ═══════ SVG ICONS ═══════ */

function svg(name,size,color){
  var s=IC[name]||IC['star'];
  s=s.replace('<svg ','<svg width="'+size+'" height="'+size+'" style="display:inline-block;flex-shrink:0;vertical-align:middle;min-width:'+size+'px" ');
  if(color) s=s.replace(/stroke="[^"]*"/g,'stroke="'+color+'"');
  return s;
}

/* ═══════ AUDIO ═══════ */
var SFX=(function(){
  var ctx=null;
  function ac(){if(!ctx){try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return ctx;}
  function tone(freq,dur,type,vol,delay){
    var c=ac();if(!c)return;
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type||'sine';o.frequency.value=freq;
    var t=c.currentTime+(delay||0);
    g.gain.setValueAtTime(vol||0.2,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+.05);
  }
  return{
    click:function(){tone(600,.04,'sine',.12);},
    xp:function(){[523,659,784].forEach(function(f,i){setTimeout(function(){tone(f,.1,'sine',.22);},i*90);});},
    coin:function(){tone(880,.05,'sine',.18);setTimeout(function(){tone(1109,.1,'sine',.18);},60);},
    complete:function(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,.12,'sine',.25);},i*80);});},
    levelup:function(){[523,587,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,.1,'sine',.28);},i*70);});},
    error:function(){tone(220,.2,'sawtooth',.12);},
    success:function(){tone(784,.08,'sine',.2);setTimeout(function(){tone(1047,.15,'sine',.2);},90);},
    mission:function(){[440,659,880].forEach(function(f,i){setTimeout(function(){tone(f,.08,'sine',.18);},i*70);}); },
    generate:function(){tone(300,.05,'sine',.1);setTimeout(function(){tone(600,.05,'sine',.15);},80);setTimeout(function(){tone(1200,.18,'sine',.2);},160);}
  };
})();

  if(S.simDone) localStorage.setItem('gc_simd_'+todayKey(),'1');
  localStorage.setItem('gc_genh',JSON.stringify(S.genHistory.slice(0,8)));
  localStorage.setItem('gc_chat',JSON.stringify((S.chatHistory||[]).slice(-50)));
  localStorage.setItem('gc_chat',JSON.stringify((S.chatHistory||[]).slice(-50)));

  if(S.aiKey) localStorage.setItem('gc_aikey',S.aiKey);
  if(S.aiProvider) localStorage.setItem('gc_aiprov',S.aiProvider);
  localStorage.setItem('gc_plan',S.plan);
  if(S.userToken) localStorage.setItem('gc_utoken',S.userToken);
}

var LEVELS=[
  {l:1,name:'Iniciante',min:0,max:500},
  {l:2,name:'Prospector',min:500,max:1200},
  {l:3,name:'Vendedor',min:1200,max:2500},
  {l:4,name:'Especialista',min:2500,max:4500},
  {l:5,name:'Master',min:4500,max:99999}
];
function getLvl(xp){return LEVELS.find(function(l){return xp>=l.min&&xp<l.max;})||LEVELS[4];}

function addXP(amt,msg){
  var prevLvl=getLvl(S.xp).l;
  S.xp+=amt;
  var newLvl=getLvl(S.xp).l;
  save();
  showToast('+'+amt+' XP — '+msg);
  updateHeader();
  showFloat('+'+amt+' XP','xp-float');
  SFX.xp();
  if(newLvl>prevLvl){
    setTimeout(function(){
      SFX.levelup();
      showToast('Subiu para Nível '+newLvl+' — '+getLvl(S.xp).name+'!');
      var el=document.getElementById('hxp');
      if(el){el.style.animation='levelUpPulse .6s ease';setTimeout(function(){el.style.animation='';},700);}
    },400);
  }
}

function addCash(amt,msg){
  S.cash+=amt;
  save();
  showFloat('+R$'+amt,'cash-float');
  SFX.coin();
  if(msg) showToast('+R$'+amt+' — '+msg);
  updateHeader();
}

function showFloat(txt,cls){
  var f=document.createElement('div');
  f.className=cls;f.textContent=txt;
  document.body.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},950);
}

function updateHeader(){
  document.getElementById('xp-val').textContent=S.xp;
  var cv=document.getElementById('credits-val');
  if(cv) cv.textContent=S.credits>=9999?'INF':S.credits;
  var hc=document.getElementById('hcredits');
  if(hc){
    if(S.credits<=0){hc.style.background='#fce8e6';hc.style.color='#ea4335';}
    else if(S.credits<=10){hc.style.background='#fff3e0';hc.style.color='#e65100';}
    else{hc.style.background='#e8f0fe';hc.style.color='#1a73e8';}
  }
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);
  t._to=setTimeout(function(){t.classList.remove('show');},2600);
}

function tag(label,color){
  return '<span class="tg" style="color:'+color+';background:'+color+'1A">'+label+'</span>';
}

/* ═══════ NAV ═══════ */
function nav(v){
  SFX.click();
  S.currentView=v;S.selectedMod=null;
  document.querySelectorAll('.section').forEach(function(el){el.classList.remove('active');});
  document.getElementById('s-'+v).classList.add('active');
  document.querySelectorAll('.nb').forEach(function(el){el.classList.toggle('a',el.dataset.v===v);});
  if(v==='home') renderHome();
  else if(v==='modules') renderModulesList();
  else if(v==='criar') renderCriar();
  else if(v==='clients') renderClients();
  else if(v==='plan') renderPlan('notes');
  else if(v==='more') renderMore('scripts');
}

   checklist:['Criei uma planilha para organizar meus prospects','Pesquisei pelo menos 3 categorias no Google Maps','Listei 20 prospects com telefone e observação do problema','Identifiquei quais têm Instagram parado'],
   quiz:[{q:'Qual é o melhor sinal de que uma empresa precisa de você?',opts:['Ter muitos funcionários','Menos de 10 avaliações e perfil incompleto','Ter um site profissional','Aparecer no topo do Google'],c:1,exp:'Perfil incompleto com poucas avaliações indica que o negócio está invisível para clientes potenciais.'},{q:'Qual ferramenta gratuita é a base da prospecção?',opts:['Instagram Ads','Google Maps','LinkedIn','TikTok'],c:1,exp:'O Google Maps mostra exatamente quais negócios existem e o estado do perfil deles.'},{q:'Quantos prospects listar antes de abordar?',opts:['3','50','20','100'],c:2,exp:'20 prospects qualificados te dão volume suficiente para testar abordagens.'}]},
  {id:3,color:'#f9ab00',tag:'CRÍTICO',xp:200,cash:40,icon:'dollar',title:'Primeira Venda',desc:'Feche seu primeiro cliente sem experiência',
   resumo:'A primeira venda é a mais difícil porque você não tem portfólio. A solução é trocar portfólio por transparência: mostre o problema real do cliente e como você vai resolver — sem precisar de resultados anteriores.',
   passos:['Aborde o prospect com a mensagem de primeiro contato da aba Scripts','Se ele responder, ofereça um diagnóstico gratuito de 10 minutos','No diagnóstico, mostre problemas reais do perfil no Google Maps','Apresente o que você vai melhorar e em quanto tempo','Ofereça um preço inicial menor para o primeiro mês com garantia'],
   exemplo:'"Fiz uma análise rápida do seu perfil no Google e encontrei 3 pontos que estão impedindo clientes de te acharem. Consigo te mostrar em 10 minutos por WhatsApp." — Esse script tem alta taxa de resposta porque entrega valor antes de pedir qualquer coisa.',
   dica:'Ofereça o primeiro mês com desconto ou garantia de resultado. Isso elimina o risco percebido e facilita o sim.',
   checklist:['Escolhi 5 prospects para abordar essa semana','Copiei o script de primeiro contato','Preparei um diagnóstico simples do perfil de cada prospect','Defini meu preço inicial para o primeiro cliente'],
   quiz:[{q:'Como compensar a falta de portfólio na primeira venda?',opts:['Mentir sobre experiência','Cobrar muito barato','Fazer diagnóstico gratuito mostrando problemas reais','Não abordar clientes ainda'],c:2,exp:'O diagnóstico gratuito entrega valor real e mostra competência sem precisar de portfólio prévio.'},{q:'Qual boa estratégia para o primeiro cliente?',opts:['Cobrar o preço máximo logo','Oferecer o primeiro mês com desconto ou garantia','Esperar ter 10 clientes','Criar um site completo primeiro'],c:1,exp:'Reduzir o risco percebido facilita o primeiro sim.'},{q:'O que o diagnóstico gratuito deve mostrar?',opts:['Seus diplomas','Problemas reais do perfil do cliente','Quanto você vai cobrar','Seus outros clientes'],c:1,exp:'Mostre problemas concretos: avaliações baixas, fotos ruins, posição no Maps, campos incompletos.'}]},
  {id:4,color:'#ea4335',tag:'BASE',xp:180,cash:35,icon:'pin',title:'Google Meu Negócio',desc:'Criação e otimização completa de perfis',
   resumo:'O Google Meu Negócio (GMB) é o produto que você vende. Um perfil bem otimizado aparece mais vezes nas buscas locais, gera mais ligações e mais visitas. Saber otimizar perfis é a habilidade central do Google Cash.',
   passos:['Acesse business.google.com e verifique ou crie o perfil do cliente','Preencha 100% das informações: nome, categoria, endereço, telefone, horários','Adicione uma descrição com palavras-chave locais como "dentista em [cidade]"','Envie pelo menos 10 fotos: fachada, interior, equipe, produtos','Configure categorias secundárias e adicione serviços detalhados com preços'],
   exemplo:'Antes: Pizzaria sem descrição, 2 fotos, 4 avaliações, horário incorreto. Depois: descrição com palavras-chave, 18 fotos, horário correto, 15 avaliações. Resultado: apareceu no top 3 para "pizza [cidade]" em 30 dias.',
   dica:'A categoria principal é o fator de rankeamento mais importante. Veja qual categoria os concorrentes melhor ranqueados usam e replique.',
   checklist:['Perfil criado e verificado no Google Meu Negócio','Todas as informações básicas preenchidas','Descrição com palavras-chave locais adicionada','Pelo menos 10 fotos enviadas','Categorias e serviços configurados'],
   quiz:[{q:'Qual é o fator de rankeamento mais importante no GMB?',opts:['Número de posts','Categoria principal','Cor do perfil','Número de funcionários'],c:1,exp:'A categoria principal define para quais buscas o perfil é relevante — fator número 1.'},{q:'Onde você acessa o Google Meu Negócio?',opts:['google.com.br','business.google.com','ads.google.com','maps.google.com'],c:1,exp:'business.google.com é o painel onde você gerencia todos os perfis de clientes.'},{q:'Quantas fotos são recomendadas para um perfil otimizado?',opts:['1 foto','3 fotos','No mínimo 10 fotos','Apenas a logo'],c:2,exp:'Perfis com 10+ fotos recebem significativamente mais visualizações e cliques.'}]},
  {id:5,color:'#1a73e8',tag:'PODER',xp:160,cash:30,icon:'star',title:'Avaliações e Autoridade',desc:'Gere reputação e aumente resultados',
   resumo:'Avaliações são a moeda mais valiosa do Google Maps. Um negócio com mais avaliações positivas aparece mais e converte mais. Sua missão é criar um sistema que gere avaliações de forma consistente para cada cliente.',
   passos:['Pegue o link direto de avaliação do perfil do cliente no painel GMB','Crie uma mensagem de WhatsApp pedindo avaliação para clientes atendidos','Configure o cliente para enviar essa mensagem a todo cliente atendido','Responda TODAS as avaliações — positivas e negativas — dentro de 24h','Meta inicial: 10 avaliações novas no primeiro mês'],
   exemplo:'Sistema simples: cliente atende um paciente, no final envia mensagem pedindo avaliação com o link. Em 30 dias, saiu de 4 para 23 avaliações. Resultado imediato no rankeamento.',
   dica:'Nunca peça avaliações em troca de desconto ou brinde — isso viola as políticas do Google e pode remover o perfil.',
   checklist:['Copiei o link de avaliação do perfil do cliente','Criei a mensagem de pedido de avaliação','Treinei o cliente sobre quando enviar a mensagem','Configurei alerta para responder avaliações novas'],
   quiz:[{q:'Por que avaliações são importantes para o rankeamento local?',opts:['Só pelo visual','Google usa número e qualidade como fator de rankeamento','Não influenciam','Apenas a nota importa'],c:1,exp:'Número de avaliações, nota média e frequência são fatores diretos de rankeamento.'},{q:'O que NUNCA fazer ao pedir avaliações?',opts:['Pedir via WhatsApp','Pedir presencialmente','Oferecer desconto em troca','Enviar o link direto'],c:2,exp:'Avaliações incentivadas com benefícios violam as políticas do Google.'},{q:'Em quanto tempo responder avaliações novas?',opts:['1 semana','1 mês','Nunca precisa','Dentro de 24 horas'],c:3,exp:'Responder rápido mostra que o negócio é ativo — sinal positivo para o Google.'}]},
  {id:6,color:'#34a853',tag:'IA',xp:170,cash:35,icon:'image',title:'Criativos com IA',desc:'Imagens, posts e conteúdo com IA',
   resumo:'Conteúdo visual de qualidade diferencia um perfil mediano de um que gera confiança. Com ferramentas de IA você cria imagens profissionais, textos e posts sem precisar ser designer ou redator.',
   passos:['Use o Canva para criar posts com templates prontos para cada categoria de negócio','Use o ChatGPT para gerar descrições, posts e textos de serviços em segundos','Para fotos do negócio, oriente o cliente a tirar fotos com luz natural e fundo limpo','Use Adobe Firefly ou ferramentas similares para melhorar fotos','Crie um calendário simples: 2 posts por semana no perfil do cliente'],
   exemplo:'Prompt de ChatGPT para GMB: "Escreva uma descrição de 200 palavras para uma clínica odontológica em [cidade] chamada [nome], especializada em clareamento e ortodontia. Tom: profissional e acolhedor." Resultado em 10 segundos.',
   dica:'Posts regulares no Google Meu Negócio (função Publicações) ajudam no rankeamento. Um post por semana já faz diferença.',
   checklist:['Criei conta no Canva e escolhi template para o nicho do cliente','Testei o ChatGPT para criar descrição e textos','Criei pelo menos 3 imagens para o perfil do cliente','Fiz a primeira publicação no Google Meu Negócio'],
   quiz:[{q:'Qual ferramenta gratuita é melhor para criar posts sem ser designer?',opts:['Photoshop','Canva','CorelDraw','After Effects'],c:1,exp:'O Canva tem templates prontos para todos os nichos e é 100% gratuito na versão básica.'},{q:'Como o ChatGPT pode ajudar?',opts:['Não pode ajudar','Criar textos e posts com um prompt bem feito','Apenas traduzir','Criar fotos automaticamente'],c:1,exp:'Com um prompt claro, o ChatGPT entrega textos prontos para uso em segundos.'},{q:'Com que frequência publicar no GMB?',opts:['Nunca','Uma vez por ano','Pelo menos 1 vez por semana','Só quando tiver novidade'],c:2,exp:'Publicações regulares sinalizam ao Google que o perfil está ativo.'}]},
  {id:7,color:'#f9ab00',tag:'ESCALA',xp:220,cash:45,icon:'trend',title:'Google Ads',desc:'Anúncios locais e primeiros resultados pagos',
   resumo:'Google Ads acelera os resultados do cliente quando o perfil orgânico não é suficiente. Com orçamento pequeno de R$20-50 por dia, você coloca o negócio do cliente na primeira posição para buscas locais relevantes.',
   passos:['Acesse ads.google.com e crie uma conta para o cliente','Escolha o objetivo "Visitas à loja local" ou "Ligações telefônicas"','Defina a área de abrangência: raio de 5-15km do negócio','Crie 3 variações de título e 2 descrições diferentes','Comece com R$15-25/dia e monitore por 7 dias antes de escalar'],
   exemplo:'Clínica com R$20/dia no Google Ads para "dentista [cidade]". Em 30 dias: 47 cliques, 12 ligações, 4 agendamentos. Custo por agendamento: R$150. Ticket médio: R$800. ROI amplamente positivo.',
   dica:'Anúncios de chamada geram ligações diretas sem precisar de site. São os mais fáceis de configurar e têm alta taxa de conversão.',
   checklist:['Criei conta no Google Ads para o cliente','Defini objetivo e área de abrangência','Criei pelo menos 3 variações de anúncio','Defini orçamento diário e palavras-chave','Configurei conversões para medir ligações'],
   quiz:[{q:'Qual objetivo é mais indicado para negócios locais?',opts:['Vendas online','Visitas à loja local ou Ligações telefônicas','Tráfego para blog','Inscrições no YouTube'],c:1,exp:'Para negócios físicos locais, o objetivo é atrair pessoas que estão perto e prontas para comprar.'},{q:'Com qual orçamento diário começar um teste?',opts:['R$1.000/dia','R$500/dia','R$15-25/dia','Precisa de R$10.000'],c:2,exp:'R$15-25/dia é suficiente para testar e colher dados reais.'},{q:'O que são anúncios de chamada?',opts:['Anúncios em áudio','Anúncios que geram ligações diretas sem site','Anúncios no YouTube','Anúncios de vagas'],c:1,exp:'Call Ads mostram o telefone diretamente — o cliente clica e já liga.'}]},
  {id:8,color:'#ea4335',tag:'LUCRO',xp:190,cash:40,icon:'pkg',title:'Pacotes de Serviços',desc:'Crie seus planos e tabela de preços',
   resumo:'Ter pacotes bem definidos facilita a venda, elimina negociação de preço e aumenta o valor percebido. Com 3 planos, o cliente compara entre os seus planos — não entre você e o concorrente.',
   passos:['Defina 3 planos: Básico, Intermediário e Premium com serviços claros','Precifique o Básico como acessível, o Intermediário como popular e o Premium como completo','Sempre apresente os 3 planos juntos — o cliente tende a escolher o do meio','Inclua garantia no plano inicial: 30 dias ou devolvemos','Documente o que está incluído em cada plano'],
   exemplo:'Básico R$247/mês: GMB otimizado + avaliações. Pro R$497/mês: Básico + 8 posts. Premium R$897/mês: Pro + Google Ads. Com essa estrutura, 60% dos clientes escolhem o plano do meio.',
   dica:'Não negocie preço — negocie escopo. Se o cliente quer pagar menos, retire um serviço do plano, nunca baixe o preço pelo mesmo pacote.',
   checklist:['Defini os serviços incluídos em cada um dos 3 planos','Precifiquei os 3 planos de forma escalonada','Criei uma tabela de preços para mostrar ao cliente','Incluí garantia no plano inicial'],
   quiz:[{q:'Por que apresentar 3 planos em vez de 1?',opts:['Para confundir o cliente','O cliente compara entre seus planos e tende a escolher o do meio','Para parecer maior','Não há vantagem'],c:1,exp:'Com 3 opções, o plano intermediário parece o mais equilibrado — é estatisticamente o mais escolhido.'},{q:'Como reagir quando o cliente pede desconto?',opts:['Sempre dar desconto','Encerrar a negociação','Negociar escopo, nunca baixar o preço pelo mesmo serviço','Dobrar o preço'],c:2,exp:'Baixar o preço pelo mesmo serviço desvaloriza o seu trabalho. Retire um item do pacote.'},{q:'Qual faixa de preço para o plano intermediário?',opts:['R$50-100','R$1.000-2.000','R$397-597','R$5.000'],c:2,exp:'R$397-597 é acessível para pequenos negócios mas rentável para você.'}]},
  {id:9,color:'#1a73e8',tag:'AVANÇADO',xp:250,cash:50,icon:'bar',title:'Escala',desc:'De 1 para 5+ clientes com organização',
   resumo:'Escalar significa atender mais clientes sem perder qualidade. O segredo está em padronizar processos, criar checklists de entrega e organizar sua rotina semanal. Com processos claros, você consegue atender 5-8 clientes com poucas horas por dia.',
   passos:['Crie um documento de onboarding padrão para novos clientes','Monte um calendário semanal: segunda e quarta para execução, terça e quinta para relatórios','Crie templates reutilizáveis: posts, respostas a avaliações, relatórios mensais','Use uma planilha simples para monitorar tarefas de cada cliente','Quando chegar a 5 clientes, analise o que pode ser delegado ou automatizado'],
   exemplo:'Rotina de 3h/dia para 5 clientes: Segunda — checar avaliações e criar posts (90min). Quarta — atualizar GMB (60min). Sexta — relatório + follow-up (30min). Total: menos de 3h/dia, R$2.000/mês.',
   dica:'O primeiro cliente é o mais difícil. Do segundo em diante, você já tem processo. Do quinto em diante, você tem um negócio.',
   checklist:['Criei documento de onboarding para novos clientes','Defini meu calendário semanal de execução','Tenho templates de posts, relatórios e respostas','Estou prospectando ativamente para o próximo cliente'],
   quiz:[{q:'Qual é o segredo para atender múltiplos clientes sem perder qualidade?',opts:['Trabalhar 16h por dia','Padronizar processos e criar checklists','Ter equipe de 10 pessoas','Só aceitar grandes empresas'],c:1,exp:'Processos padronizados permitem replicar a qualidade para cada cliente sem reinventar a roda.'},{q:'Quantas horas diárias para 5 clientes com processos definidos?',opts:['12 horas','8 horas','2-3 horas organizadas','Não é possível sozinho'],c:2,exp:'Com templates e rotina definida, 5 clientes cabem em 2-3 horas diárias de trabalho focado.'},{q:'O que fazer ao chegar a 5 clientes?',opts:['Parar de prospectar','Analisar o que pode ser delegado ou automatizado','Fechar o negócio','Baixar preços'],c:1,exp:'5 clientes é o ponto onde começar a pensar em alavancagem.'}]},
  {id:10,color:'#34a853',tag:'AVANÇADO',xp:300,cash:60,icon:'bot',title:'Automação com IA',desc:'Ferramentas para turbinar sua operação',
   resumo:'Automação elimina tarefas repetitivas e libera seu tempo para vender mais e atender mais clientes. Ferramentas como n8n, Zapier e IA de texto permitem criar sistemas que trabalham por você 24 horas por dia.',
   passos:['Identifique as 3 tarefas que você mais repete por semana','Use o ChatGPT para gerar respostas padrão a avaliações positivas e negativas','Configure alertas de novas avaliações no Google','Use n8n ou Zapier para automatizar relatórios e notificações','Crie prompts salvos para gerar posts e textos para cada nicho de cliente'],
   exemplo:'Automação simples com Zapier: nova avaliação no GMB gera notificação automática no WhatsApp. Você responde em segundos. Custo: R$0 no plano gratuito para até 100 automatizações/mês.',
   dica:'Comece automatizando relatórios. Um relatório mensal automatizado economiza 2-3 horas por cliente por mês.',
   checklist:['Listei as 3 tarefas mais repetitivas da minha rotina','Criei prompts salvos no ChatGPT para geração de conteúdo','Configurei alertas de novas avaliações','Testei pelo menos 1 automação com Zapier ou n8n'],
   quiz:[{q:'Qual é a principal vantagem da automação?',opts:['Impressionar clientes','Eliminar tarefas repetitivas e liberar tempo para vender mais','Parecer mais profissional','Cobrar mais caro'],c:1,exp:'Automação transforma tempo gasto em tarefas repetitivas em tempo disponível para crescer o negócio.'},{q:'Qual ferramenta permite criar automações entre apps sem programar?',opts:['Photoshop','Excel','Zapier ou n8n','Word'],c:2,exp:'Zapier e n8n conectam apps diferentes sem código.'},{q:'Por onde começar na automação?',opts:['Automatizar tudo de uma vez','Pelos relatórios e alertas de avaliações','Nunca automatizar','Contratar programador primeiro'],c:1,exp:'Relatórios e alertas são simples de automatizar e têm impacto imediato.'}]},
  {id:11,color:'#f9ab00',tag:'MASTER',xp:350,cash:70,icon:'layout',title:'Sistema Operacional',desc:'Organize sua operação como um negócio',
   resumo:'Agora você tem um negócio real. O passo final é tratá-lo como empresa: processos documentados, metas mensais, controle financeiro e um sistema de crescimento contínuo. Quem tem sistema cresce. Quem não tem sistema fica estagnado.',
   passos:['Defina sua meta: quantos clientes e qual faturamento em 3, 6 e 12 meses','Documente todos os seus processos em um Google Docs ou Notion','Crie um controle financeiro simples: entradas por cliente, saídas, lucro','Reserve 1 hora por semana para revisar o que está funcionando','Defina quando vai contratar o primeiro assistente ou parceiro'],
   exemplo:'Meta de 12 meses: 10 clientes a R$500/mês = R$5.000 mensais. Meses 1-2: fechar 2 clientes. Meses 3-6: ir para 5 clientes. Meses 7-12: escalar para 10 com automação e 1 assistente part-time.',
   dica:'Trate seu negócio como você trata os negócios dos seus clientes. Você precisa de organização e estratégia tanto quanto eles.',
   checklist:['Defini metas de 3, 6 e 12 meses com números concretos','Documentei meus processos principais','Criei controle financeiro simples','Tenho revisão semanal marcada na agenda'],
   quiz:[{q:'Qual é a diferença entre freelancer e negócio?',opts:['Não há diferença','Negócio tem sistema, processo e pode escalar sem depender só de você','Apenas o nome muda','Negócio paga mais impostos'],c:1,exp:'Negócio tem sistemas que funcionam independentemente de você.'},{q:'Com qual frequência revisar o que está funcionando?',opts:['Nunca','Uma vez por ano','A cada 5 anos','1 hora por semana'],c:3,exp:'Revisão semanal permite ajustar rapidamente e evitar que problemas pequenos se tornem grandes.'},{q:'Qual é uma meta realista para 12 meses?',opts:['R$50.000/mês no primeiro ano','10 clientes a R$500 = R$5.000/mês','Nenhuma meta é realista','1 cliente por ano'],c:1,exp:'R$5.000/mês em 12 meses com 10 clientes é ambicioso e alcançável com execução consistente.'}]},
  {id:12,color:'#1877f2',tag:'META ADS',xp:280,cash:55,icon:'meta',title:'Meta Ads',desc:'Facebook e Instagram para empresas locais',
   resumo:'O Meta Ads (Facebook + Instagram) é uma das ferramentas mais poderosas para negócios locais. Com segmentação por raio de localização e interesses, você mostra anúncios exatamente para pessoas que estão perto do negócio do seu cliente.',
   passos:['Crie uma conta no Meta Business Suite para o cliente','Vincule a página do Facebook e o perfil do Instagram do negócio','No Gerenciador de Anúncios, escolha objetivo "Reconhecimento local" ou "Mensagens"','Segmente por raio de localização (3-10km) e faixa etária relevante','Crie anúncios com foto do negócio, oferta clara e chamada para ação'],
   exemplo:'Barbearia com R$15/dia no Meta Ads. Segmentação: homens de 18-45 anos num raio de 5km. Anúncio com foto do corte + "Agendamento pelo WhatsApp". Em 2 semanas: 43 mensagens recebidas, 18 agendamentos confirmados.',
   dica:'Vídeos curtos (15-30 segundos) têm custo por resultado até 3x menor que imagens estáticas no Meta Ads. Oriente o cliente a gravar um vídeo simples no celular.',
   checklist:['Criei conta no Meta Business Suite para o cliente','Vinculei Facebook e Instagram do negócio','Configurei segmentação por localização','Criei pelo menos 2 variações de anúncio','Configurei pixel para rastrear conversões'],
   quiz:[{q:'Qual segmentação é mais eficiente para negócios locais no Meta Ads?',opts:['Todo o Brasil','Apenas por interesse em futebol','Raio de localização + faixa etária','Apenas por idade'],c:2,exp:'Segmentar por raio de 3-10km garante que o anúncio chegue apenas para pessoas que podem visitar o negócio.'},{q:'Qual tipo de conteúdo tem menor custo por resultado?',opts:['Imagens estáticas','Vídeos curtos de 15-30 segundos','Textos longos','Stories com texto'],c:1,exp:'Vídeos curtos têm taxa de engajamento maior, o que reduz o custo por resultado.'},{q:'Qual objetivo usar para gerar mensagens no WhatsApp?',opts:['Reconhecimento de marca','Tráfego para site','Mensagens','Instalações de app'],c:2,exp:'O objetivo Mensagens direciona o usuário direto para o WhatsApp do negócio.'}]},
  {id:13,color:'#202124',tag:'TIKTOK',xp:240,cash:48,icon:'video',title:'TikTok para Negócios',desc:'Alcance orgânico e anúncios no TikTok',
   resumo:'O TikTok oferece alcance orgânico impossível em outras plataformas. Um vídeo bem feito de um negócio local pode alcançar milhares de pessoas na cidade gratuitamente. Para negócios de alimentação, estética e serviços visuais, o resultado é especialmente forte.',
   passos:['Crie uma conta TikTok Business para o cliente','Grave vídeos curtos (15-30s) mostrando o processo do serviço ou produto','Use músicas em alta e hashtags locais como #[cidade] #[nicho][cidade]','Poste pelo menos 3 vezes por semana para o algoritmo distribuir o conteúdo','Para anúncios, use o TikTok Ads Manager com objetivo de tráfego local'],
   exemplo:'Sorveteria postou vídeo de 20 segundos mostrando a montagem de um sundae. Sem anúncio pago, o vídeo alcançou 12.000 pessoas da cidade em 3 dias. Resultado: fila na porta no fim de semana seguinte.',
   dica:'No TikTok, o conteúdo autêntico e simples sempre supera o conteúdo produzido. Um celular bem posicionado e boa iluminação natural já são suficientes.',

function gcMarkdown(text){
  text=text.replace(/```html\n?([\s\S]*?)```/g,function(match,html){
    try{var blob=new Blob([html],{type:"text/html"});var burl=URL.createObjectURL(blob);
      return "<div style=\"margin:8px 0;background:#e8f0fe;border-radius:10px;padding:12px\"><p style=\"font-size:11px;font-weight:700;color:#1a73e8;margin:0 0 8px\">Landing Page gerada</p><div style=\"display:flex;gap:6px\">"+"<a href=\""+burl+"\" target=\"_blank\" style=\"flex:1;padding:8px;background:#1a73e8;color:#fff;text-decoration:none;border-radius:8px;font-size:12px;font-weight:700;text-align:center\">Visualizar</a>"+"<a href=\""+burl+"\" download=\"landing.html\" style=\"flex:1;padding:8px;background:#fff;color:#1a73e8;text-decoration:none;border-radius:8px;font-size:12px;font-weight:700;text-align:center;border:.5px solid #1a73e8\">Baixar HTML</a>"+"</div></div>";
    }catch(e){return "<p style=\"font-size:12px;color:#1a73e8\">Landing page gerada.</p>";}
  });
  text=text.replace(/```[\w]*\n?([\s\S]*?)```/g,"<pre style=\"background:#f5f5f5;border-radius:8px;padding:10px;font-size:12px;overflow-x:auto;white-space:pre-wrap;margin:6px 0\">$1</pre>");
  text=text.replace(/!\[([^\]]*)\]\((https?:\/\/[^)]+)\)/g,function(mt,alt,url){return "<div style=\"margin:8px 0\">"+"<img src=\""+url+"\" alt=\""+gcEsc(alt)+"\" style=\"width:100%;border-radius:10px;display:block;max-height:280px;object-fit:cover\" onerror=\"this.style.display='none'\">"+"<div style=\"display:flex;gap:6px;margin-top:6px\">"+"<a href=\""+url+"\" target=\"_blank\" download style=\"flex:1;padding:7px;background:#7c3aed;color:#fff;text-decoration:none;border-radius:8px;font-size:12px;font-weight:700;text-align:center\">Baixar</a>"+"<button onclick=\"gcSendSuggestion('Gere outra variacao com estilo diferente')\" style=\"flex:1;padding:7px;background:#f5f3ff;color:#7c3aed;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit\">Variar</button></div></div>";});
  text=text.replace(/\*\*([^*\n]+)\*\*/g,"<strong>$1</strong>");
  text=text.replace(/\*([^*\n]+)\*/g,"<em>$1</em>");
  text=text.replace(/`([^`\n]+)`/g,q("<code style=\"background:#f0f0f0;padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace\">$1</code>"));
  text=text.replace(/^[*-] (.+)$/gm,q("<div style=\"display:flex;gap:5px;margin:1px 0\"><span style=\"color:#1a73e8\">&#8226;</span><span>$1</span></div>"));
  text=text.replace(/^\d+\. (.+)$/gm,"<div style=\\"margin:2px 0\\">$1</div>");
  text=text.replace(/\n\n/g,"<br><br>");text=text.replace(/\n/g,"<br>");return text;
}

function renderQuiz(m){
  var q=_QS;
  if(q.finished){
    var passed=q.score>=2;
    return '<div style="background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:28px 16px;text-align:center;margin-top:0">'+svg(passed?'check':'x','30',passed?'#34a853':'#ea4335')+'<p style="margin:8px 0 4px;font-size:17px;font-weight:700;color:#202124">'+(passed?'Quiz aprovado!':'Tente novamente')+'</p><p style="margin:0 0 14px;font-size:13px;color:#888">'+q.score+' de '+m.quiz.length+' corretas</p>'+(!passed?'<button onclick="resetQuiz()" style="padding:9px 22px;background:'+m.color+';color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Refazer quiz</button>':'')+'</div>';
  }
  var qi=m.quiz[q.step];
  var ans=q.answers[q.step];
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:12px;color:#888">Questão '+(q.step+1)+' de '+m.quiz.length+'</span><div class="dots">';
  m.quiz.forEach(function(_,i){h+='<div class="dot" style="background:'+(i<q.step?'#34a853':i===q.step?m.color:'#e0e0e0')+'"></div>';});
  h+='</div></div>';
  h+='<div class="cd" style="margin-bottom:12px"><p style="margin:0;font-size:14px;font-weight:600;color:#202124;line-height:1.5">'+esc(qi.q)+'</p></div>';
  qi.opts.forEach(function(opt,oi){
    var isCorrect=oi===qi.c;
    var isAns=ans===oi;
    var bc='rgba(0,0,0,.08)',bg='#fff',tc='#202124';
    if(ans!==undefined){
      if(isCorrect){bc='#34a85338';bg='#e6f4ea';tc='#188038';}
      else if(isAns){bc='#ea433538';bg='#fce8e6';tc='#c5221f';}
    }
    h+='<button class="qopt" style="border-color:'+bc+';background:'+bg+';cursor:'+(ans===undefined?'pointer':'default')+'" '+(ans===undefined?'onclick="answerQ('+oi+')"':'')+'>'+
      '<div class="qlet" style="border-color:'+bc+';color:'+tc+'">'+'ABCD'[oi]+'</div>'+
      '<span style="font-size:13px;color:'+tc+';line-height:1.4">'+esc(opt)+'</span></button>';
  });
  if(ans!==undefined){
    h+='<div style="margin-top:8px;padding:10px 13px;border-radius:8px;background:'+(ans===qi.c?'#e6f4ea':'#fce8e6')+';border:.5px solid '+(ans===qi.c?'#34a85330':'#ea433530')+'"><p style="font-size:12px;color:#444;margin:0;line-height:1.5">'+esc(qi.exp)+'</p></div>';
  }
  return h;
}

function allCKDone(m){return m.checklist.every(function(_,i){return _CK[i];});}
function toggleCK(i){SFX.click();_CK[i]=!_CK[i];renderModDetail('learn');}
function answerQ(oi){
  var m=MODULES.find(function(x){return x.id===S.selectedMod;});
  if(!m)return;
  var qi=m.quiz[_QS.step];
  _QS.answers[_QS.step]=oi;
  if(oi===qi.c){_QS.score++;SFX.success();}else{SFX.error();}
  renderModDetail('quiz');
  setTimeout(function(){
    if(_QS.step<m.quiz.length-1){_QS.step++;renderModDetail('quiz');}
    else{_QS.finished=true;renderModDetail('quiz');}
  },900);
}
function resetQuiz(){_QS={step:0,answers:[],finished:false,score:0};renderModDetail('quiz');}
function completeModule(id){
  if(S.completedMods.indexOf(id)>-1)return;
  var m=MODULES.find(function(x){return x.id===id;});
  S.completedMods.push(id);
  save();
  SFX.complete();
  addXP(m.xp,'Módulo '+m.title+' concluído!');
  addCash(m.cash,'Módulo concluído');
  renderModDetail('learn');
}

function addNote(){

  if(!t){SFX.error();showToast('Digite um título!');return;}
  SFX.success();
  S.notes.push({title:t,body:b,date:todayKey()});
  save();
  addXP(10,'Nota salva!');
  renderPlan('notes');
}
function deleteNote(i){S.notes.splice(i,1);save();renderPlan('notes');}

function addAgenda(){
  var t=(document.getElementById('ag-title').value||'').trim();
  var d=(document.getElementById('ag-date').value||'').trim();
  var tm=(document.getElementById('ag-time').value||'').trim();
  if(!t||!d){SFX.error();showToast('Preencha título e data!');return;}
  SFX.success();
  S.agenda.push({id:Date.now(),title:t,date:d,time:tm||'09:00',type:document.getElementById('ag-type').value});
  save();
  addXP(10,'Agendamento criado!');
  renderPlan('agenda');
}
function deleteAgenda(id){S.agenda=S.agenda.filter(function(a){return a.id!==id;});save();renderPlan('agenda');}

function addProduct(){
  var n=(document.getElementById('prd-name').value||'').trim();
  var raw=(document.getElementById('prd-items').value||'').trim();
  var p=(document.getElementById('prd-price').value||'').trim();
  if(!n){SFX.error();showToast('Digite o nome do pacote!');return;}
  var items=raw.split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
  SFX.success();
  S.products.push({name:n,items:items,price:p});
  save();
  addXP(20,'Pacote criado!');
  renderPlan('products');
}
function deleteProduct(i){S.products.splice(i,1);save();renderPlan('products');}

/* copia qualquer texto para clipboard com fallback robusto */
function _copiar(text){
  if(navigator.clipboard&&window.isSecureContext){
    return navigator.clipboard.writeText(text).catch(function(){_copiarFallback(text);});
  }
  _copiarFallback(text);
}
function _copiarFallback(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}
function _btnDone(btnId,labelOriginal){
  var btn=document.getElementById(btnId);
  if(!btn)return;
  var orig=btn.innerHTML;
  btn.innerHTML=svg('check','13','#188038')+' Copiado!';
  btn.style.background='#e6f4ea';btn.style.color='#188038';
  setTimeout(function(){btn.innerHTML=labelOriginal||orig;btn.style.background='';btn.style.color='';},2200);
}

function copiarTexto(btnId,text){

}

/* ═══════ ANUNCIOS — ROI CALC ═══════ */
function calcROI(){
  var inv=parseFloat(document.getElementById('roi-inv').value)||500;
  var cpc=parseFloat(document.getElementById('roi-cpc').value)||1.5;
  var cvr=parseFloat(document.getElementById('roi-cvr').value)||3;
  var ticket=parseFloat(document.getElementById('roi-ticket').value)||300;
  var clicks=Math.floor(inv/cpc);
  var leads=Math.floor(clicks*(cvr/100));
  var revenue=leads*ticket;
  var roi=revenue>0?Math.round(((revenue-inv)/inv)*100):0;
  var el=document.getElementById('roi-result');
  if(!el)return;
  el.innerHTML='<div style="background:#f8f9fa;border-radius:10px;padding:12px">'
    +'<div class="roi-row"><span>Cliques estimados</span><span class="roi-val">'+clicks.toLocaleString('pt-BR')+'</span></div>'
    +'<div class="roi-row"><span>Leads gerados</span><span class="roi-val">'+leads+'</span></div>'
    +'<div class="roi-row"><span>Faturamento estimado</span><span class="roi-val">R$'+revenue.toLocaleString('pt-BR')+'</span></div>'
    +'<div class="roi-row" style="border:none"><span style="font-weight:700">ROI do anuncio</span><span class="roi-green" style="font-size:18px;font-weight:800">'+roi+'%</span></div>'
    +'</div>'
    +'<p style="font-size:11px;color:#aaa;margin-top:6px;text-align:center">Estimativa — varia por nicho e qualidade do criativo</p>';
}

    var slug=nome.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    res.innerHTML='<div class="cd" style="border-color:#34a853">'
      +'<p style="font-size:14px;font-weight:700;color:#34a853;margin-bottom:8px">Landing page pronta!</p>'
      +'<p style="font-size:12px;color:#555;margin-bottom:12px">'+d.html.length.toLocaleString('pt-BR')+' caracteres — pagina completa e responsiva</p>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
      +'<a href="'+url+'" target="_blank" style="flex:1;min-width:120px;padding:10px;background:#1a73e8;color:#fff;text-decoration:none;border-radius:10px;font-size:13px;font-weight:700;text-align:center">Abrir Preview</a>'
      +'<a href="'+url+'" download="'+slug+'.html" style="flex:1;min-width:120px;padding:10px;background:#34a853;color:#fff;text-decoration:none;border-radius:10px;font-size:13px;font-weight:700;text-align:center">Baixar HTML</a>'
      +'</div>'
      +'<p style="font-size:11px;color:#aaa;margin-top:8px">Suba o arquivo no Vercel, Netlify ou envie diretamente para o cliente.</p>'
      +'</div>';
  })
  .catch(function(e){
    btn.disabled=false;btn.innerHTML=svg('layout','14','#fff')+' Gerar Landing Page';
    res.innerHTML='<div class="cd" style="border-color:#ea4335"><p style="color:#ea4335;font-size:13px">Erro: '+e.message+'</p></div>';
    SFX.error();
  });
}

/* ═══════ WHATSAPP ═══════ */
function verificarWA(){
  fetch('/api/whatsapp?action=status')
  .then(function(r){return r.json();})
  .then(function(d){
    var el=document.getElementById('wa-status');
    if(!el)return;
    if(d.configured){
      el.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#e6f4ea;border-radius:8px"><div style="width:10px;height:10px;border-radius:50%;background:#34a853"></div><span style="font-size:13px;color:#34a853;font-weight:600">Conectado — '+d.url+'</span></div>';
    } else {
      el.innerHTML='<div style="padding:10px;background:#fce8e6;border-radius:8px"><p style="font-size:12px;color:#ea4335;margin:0">Nao configurado. Siga os passos abaixo.</p></div>';
    }
    SFX.click();
  })
  .catch(function(){
    var el=document.getElementById('wa-status');
    if(el)el.innerHTML='<div style="font-size:12px;color:#aaa;padding:8px">Nao foi possivel verificar.</div>';
  });
}

function enviarWA(){
  var num=document.getElementById('wa-num').value.trim();
  var msg=document.getElementById('wa-msg').value.trim();
  if(!num||!msg){showToast('Preencha numero e mensagem');SFX.error();return;}
  SFX.generate();
  fetch('/api/whatsapp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'send',numero:num,mensagem:msg})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok||d.key){SFX.success();showToast('Mensagem enviada!');addXP(10,'Mensagem enviada via WA');}
    else{SFX.error();showToast(d.error||'Erro ao enviar');}
  })
  .catch(function(e){SFX.error();showToast('Erro: '+e.message);});
}

function usarTemplate(i){
  var t=window._waTpls&&window._waTpls[i];
  if(!t)return;
  var el=document.getElementById('wa-msg');
  if(el){el.value=t.m;}
  SFX.click();
  showToast('Template carregado');
}

function abrirWADireto(encoded){
  window.open('https://wa.me/?text='+encoded,'_blank');
  SFX.click();
}

/* ═══════ SETUP IA ═══════ */
function recuperarAcesso(){
  var email=(document.getElementById('acesso-email')||{}).value||'';
  var res=document.getElementById('acesso-res');
  if(!email||!email.includes('@')){if(res)res.innerHTML='<p style="font-size:12px;color:#ea4335">Digite um e-mail valido.</p>';return;}
  if(res)res.innerHTML='<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#888"><div style="width:14px;height:14px;border:2px solid #e8e8e8;border-top-color:#34a853;border-radius:50%;animation:spin .8s linear infinite"></div>Buscando...</div>';
  fetch('/api/acesso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok&&d.token){
      S.userToken=d.token;
      S.credits=d.credits||50;
      S.plan=d.plan||'starter';
      save();
      SFX.levelup();
      addXP(20,'Acesso ativado!');
      renderMore('setup');
    } else {
      if(res)res.innerHTML='<div class="cd" style="border-color:#ea4335;padding:10px"><p style="font-size:12px;color:#ea4335;margin:0">'+(d.error||'E-mail nao encontrado')+'</p>'+(d.dica?'<p style="font-size:11px;color:#888;margin:4px 0 0">'+d.dica+'</p>':'')+'</div>';
    }
  })
  .catch(function(){if(res)res.innerHTML='<p style="font-size:12px;color:#ea4335">Erro de conexao. Tente novamente.</p>';});
}

function copiarToken(){
  _copiar(S.userToken);
  SFX.success();
  showToast('Token copiado!');
}

function sincronizarCreditos(){
  if(!S.userToken){alert('Token nao encontrado. Recupere seu acesso primeiro.');return;}
  fetch('/api/credits?token='+S.userToken)
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){
      S.credits=d.credits;
      S.plan=d.plan||S.plan;
      save();
      updateHeader();
      SFX.success();
      renderMore('setup');
    }
  })
  .catch(function(){});
}

function salvarChaveIA(){
  var key=(document.getElementById('ai-key-input')||{}).value||'';
  var prov=(document.getElementById('ai-prov')||{}).value||'groq';
  S.aiKey=key.trim();
  S.aiProvider=prov;
  save();
  SFX.success();
  if(S.aiKey){
    showToast('Chave salva! IA ilimitada ativada.');
    addXP(20,'Chave de IA configurada');
  } else {
    showToast('Chave removida. Usando creditos.');
  }
}

function copiarSetupCmd(){
  var cmd='npm install -g @gitlawb/openclaude@latest && openclaude';
  _copiar(cmd);
  SFX.success();
  showToast('Comando copiado!');
  _btnDone('btn-openclaude',svg('copy','12','#fff')+' Copiar');
}

/* ═══════ LGPD ═══════ */
function showLGPD(){
  if(S.lgpdOk)return;
  var d=document.createElement('div');
  d.id='lgpd-banner';
  d.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#202124;color:#fff;border-radius:16px;padding:16px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)';
  d.innerHTML='<div style="display:flex;gap:12px;align-items:flex-start"><div style="flex:1"><p style="margin:0 0 4px;font-size:13px;font-weight:700">Privacidade e LGPD</p><p style="margin:0 0 10px;font-size:12px;color:#bbb;line-height:1.5">Este app usa localStorage para salvar seu progresso localmente. Nenhum dado pessoal e enviado a servidores. Ao continuar voce aceita nossa politica de privacidade.</p><div style="display:flex;gap:8px"><button onclick="aceitarLGPD()" style="padding:8px 16px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">Aceitar</button><a href="#" onclick="mostrarTermos();return false" style="padding:8px 12px;background:transparent;color:#bbb;font-size:12px;text-decoration:none;display:inline-block">Ver termos</a></div></div></div>';
  document.body.appendChild(d);
}
function aceitarLGPD(){
  S.lgpdOk=true;
  localStorage.setItem('gc_lgpd','1');
  var b=document.getElementById('lgpd-banner');
  if(b)b.remove();
}
function mostrarTermos(){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end';
  d.innerHTML='<div style="background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-height:80vh;overflow-y:auto"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0;font-size:16px;color:#202124">Termos de Uso e Privacidade</h2><button onclick="this.closest(\'div[style*=inset]\').remove()" style="background:none;border:none;cursor:pointer;padding:4px">'+svg('x','18','#666')+'</button></div><p style="font-size:13px;color:#444;line-height:1.7"><strong>1. Dados locais:</strong> Todo o progresso (XP, clientes, notas) fica salvo apenas no seu dispositivo via localStorage. Nao armazenamos dados em servidores.<br><br><strong>2. Geracao de imagens:</strong> Prompts enviados ao Pollinations.AI sao processados por servicos terceiros. Nao inclua dados pessoais nos prompts.<br><br><strong>3. Pagamento:</strong> Processado pela InfinitePay com criptografia SSL. Nao armazenamos dados de cartao.<br><br><strong>4. Uso comercial:</strong> O conteudo deste app e exclusivo para membros. Redistribuicao e proibida.<br><br><strong>5. LGPD:</strong> Em conformidade com a Lei 13.709/2018. Para solicitar exclusao de dados ou esclarecimentos: henryksgroup@gmail.com</p><button onclick="aceitarLGPD();this.closest(\'div[style*=inset]\').remove()" style="width:100%;margin-top:16px;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer">Entendido — Aceitar</button></div>';
  document.body.appendChild(d);
}

/* ═══════ INIT ═══════ */
function initApp(){
  updateHeader();
  renderHome();
  setTimeout(showLGPD,1500);
}
</script>
