<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:48px 32px;max-width:480px;width:100%;text-align:center}

.badge{display:inline-block;background:#1a73e820;color:#1a73e8;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-top:24px}

<script>
  // Dispara evento de conversão no GTM ao carregar a página
  (function() {
    var params = new URLSearchParams(window.location.search);
    var via = params.get('via') || 'direto';
    var valor = parseFloat(params.get('valor')) || 117.00;

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'purchase',
      ecommerce: {
        transaction_id: 'TX-' + Date.now(),
        value: valor,
        currency: 'BRL',
        payment_method: via,
        items: [{
          item_name: 'Google Cash',
          item_id: 'GC001',
          price: valor,
          quantity: 1
        }]
      }
    });
  })();
</script>
